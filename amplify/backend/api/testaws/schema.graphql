type Todo @model @auth(rules: [{allow: owner}]) {
  id: ID!
  name: String!
  description: String
  completed: Boolean!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type Note @model @auth(rules: [{allow: owner}]) {
  id: ID!
  title: String!
  content: String!
  tags: [String]
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type User @model @auth(rules: [{allow: owner}]) {
  id: ID!
  username: String!
  email: String!
  profile: UserProfile
}

type UserProfile {
  firstName: String
  lastName: String
  avatar: String
}

type ProcessResult {
  message: String!
  count: Int!
}

type CompletionResult {
  id: ID!
  completed: Boolean!
  message: String!
}

type Query {
  processTodos(limit: Int): ProcessResult @function(name: "todoProcessor-${env}")
}

type Mutation {
  completeTodo(id: ID!): CompletionResult @function(name: "todoProcessor-${env}")
}

